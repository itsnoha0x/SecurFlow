name: CTI Security Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      severity_filter:
        description: 'Severity levels to scan (CRITICAL,HIGH,MEDIUM,LOW)'
        required: false
        default: 'CRITICAL,HIGH,MEDIUM'
      target_path:
        description: 'Target path to scan'
        required: false
        default: 'target_app'
      force_full_scan:
        description: 'Force full pipeline run'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  GRYPE_VERSION: '0.77.4'

jobs:
  # P1: Security Scanner Phase
  scan:
    name: P1 - Security Scanning
    runs-on: ubuntu-latest
    outputs:
      scan-results-path: ${{ steps.scan.outputs.results-path }}
      scan-summary: ${{ steps.scan.outputs.summary }}
      critical-count: ${{ steps.scan.outputs.critical-count }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # ----------------------------------------------------------------
    # TRIVY — action officielle (cache binaire + DB gérés nativement)
    # ----------------------------------------------------------------
    - name: Install Trivy via action officielle
      uses: aquasecurity/setup-trivy@v0.2.1
      with:
        version: latest
        cache: true

    # ----------------------------------------------------------------
    # CACHE GRYPE : binaire + base de données de vulnérabilités
    # ----------------------------------------------------------------
    - name: Cache Grype binary
      uses: actions/cache@v3
      id: cache-grype-bin
      with:
        path: /usr/local/bin/grype
        key: grype-bin-${{ env.GRYPE_VERSION }}-${{ runner.os }}

    - name: Cache Grype vulnerability DB
      uses: actions/cache@v3
      with:
        path: ~/.cache/grype
        key: grype-db-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          grype-db-${{ runner.os }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Grype (si absent du cache)
      if: steps.cache-grype-bin.outputs.cache-hit != 'true'
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
          | sh -s -- -b /usr/local/bin

    - name: Update Grype vulnerability DB
      run: grype db update
        
    - name: Run P1 Scanner
      id: scan
      run: |
        cd src/p1_scanner
        python scanner.py \
          --target "../../target_app" \
          --severity "${{ github.event.inputs.severity_filter || 'CRITICAL,HIGH,MEDIUM' }}" \
          --output "../../shared/1_raw_results.json"
        EXIT_CODE=$?
        # Exit 2 = CRITICAL trouvees (comportement attendu, pas une erreur technique)
        # Exit 1 = erreur technique reelle
        if [ $EXIT_CODE -eq 2 ]; then
          echo "critical-found=true" >> $GITHUB_OUTPUT
          echo "[!] CVEs CRITICAL detectees — pipeline continue jusqu'au gate P4"
          exit 0
        fi
        exit $EXIT_CODE
        
    - name: Extract scan summary
      id: summary
      run: |
        if [ -f "../../shared/1_raw_results.json" ]; then
          if [ -s "../../shared/1_raw_results.json" ]; then
            CRITICAL_COUNT=$(jq -r '.summary.by_severity.CRITICAL // 0' ../../shared/1_raw_results.json 2>/dev/null || echo "0")
            echo "critical-count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
            echo "summary={\"critical\": $CRITICAL_COUNT}" >> $GITHUB_OUTPUT
          else
            echo "critical-count=0" >> $GITHUB_OUTPUT
            echo "summary={\"critical\": 0}" >> $GITHUB_OUTPUT
          fi
        else
          echo "critical-count=0" >> $GITHUB_OUTPUT
          echo "summary={\"critical\": 0}" >> $GITHUB_OUTPUT
        fi
        
    - name: Upload scan results
      uses: actions/upload-artifact@v4
      with:
        name: scan-results
        path: shared/1_raw_results.json
        retention-days: 30
        
    - name: Upload scan report
      uses: actions/upload-artifact@v4
      with:
        name: scan-report
        path: results/*_report.txt
        retention-days: 30

  # P2: Threat Intelligence Enrichment
  enrich:
    name: P2 - Threat Intelligence Enrichment
    runs-on: ubuntu-latest
    needs: scan
    if: |
      needs.scan.result == 'success' ||
      github.event.inputs.force_full_scan == 'true'
    outputs:
      enrich-results-path: ${{ steps.enrich.outputs.results-path }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Download scan results
      uses: actions/download-artifact@v4
      with:
        name: scan-results
        path: shared/
        
    - name: Run P2 Enricher
      id: enrich
      run: |
        cd src/p2_enricher
        python enricher.py \
          --input "../../shared/1_raw_results.json" \
          --output "../../shared/2_enriched.json"
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
        CISA_API_KEY: ${{ secrets.CISA_API_KEY }}
        
    - name: Upload enriched results
      uses: actions/upload-artifact@v4
      with:
        name: enriched-results
        path: shared/2_enriched.json
        retention-days: 30

  # P3: AI Decision Engine
  decide:
    name: P3 - AI Decision Engine
    runs-on: ubuntu-latest
    needs: enrich
    if: |
      needs.enrich.result == 'success' ||
      github.event.inputs.force_full_scan == 'true'
    outputs:
      decision-results-path: ${{ steps.decide.outputs.results-path }}
      critical-decisions: ${{ steps.decide.outputs.critical-decisions }}
      pipeline-blocked: ${{ steps.decide.outputs.pipeline-blocked }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Download enriched results
      uses: actions/download-artifact@v4
      with:
        name: enriched-results
        path: shared/
        
    - name: Run P3 Decision Engine
      id: decide
      run: |
        cd src/p3_decision_engine
        python decision_engine.py \
          --input "../../shared/2_enriched.json" \
          --output "../../shared/3_final_report.json"
      env:
        FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
        
    - name: Extract decision summary
      id: summary
      run: |
        if [ -f "../../shared/3_final_report.json" ]; then
          CRITICAL_DECISIONS=$(jq -r '.decision_metadata.decisions.BLOQUER // 0' ../../shared/3_final_report.json)
          PIPELINE_BLOCKED=$(jq -r '.decision_metadata.decisions.BLOQUER > 0' ../../shared/3_final_report.json)
          echo "critical-decisions=$CRITICAL_DECISIONS" >> $GITHUB_OUTPUT
          echo "pipeline-blocked=$PIPELINE_BLOCKED" >> $GITHUB_OUTPUT
        fi
        
    - name: Upload Final Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: securflow-final-report
        path: shared/3_final_report.json
        
    - name: Generate security summary
      id: security-summary
      run: |
        if [ -f "../../shared/3_final_report.json" ]; then
          TOTAL_VULNS=$(jq -r '.decision_metadata.total_processed' ../../shared/3_final_report.json)
          CRITICAL_COUNT=$(jq -r '.decision_metadata.decisions.BLOQUER // 0' ../../shared/3_final_report.json)
          HIGH_COUNT=$(jq -r '.decision_metadata.decisions.ALERTER // 0' ../../shared/3_final_report.json)
          AVG_SRP=$(jq -r '.decision_metadata.average_srp' ../../shared/3_final_report.json)
          
          echo "## 🔍 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Vulnerabilities | $TOTAL_VULNS |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical Decisions | $CRITICAL_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| High Priority | $HIGH_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Average SRP Score | $AVG_SRP/10.0 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "## 🚨 CRITICAL ISSUES DETECTED" >> $GITHUB_STEP_SUMMARY
            echo "Pipeline **BLOCKED** due to $CRITICAL_COUNT critical vulnerabilities requiring immediate attention." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Pipeline Passed" >> $GITHUB_STEP_SUMMARY
            echo "No critical security issues detected. Pipeline can proceed safely." >> $GITHUB_STEP_SUMMARY
          fi
        fi
        
    - name: 💾 Sauvegarder le rapport dans le dépôt
      run: |
        if [ -f shared/3_final_report.json ]; then
          echo "✅ Rapport trouvé, sauvegarde en cours..."
          cat shared/3_final_report.json | head -20
        else
          echo "❌ Rapport non trouvé !"
          exit 1
        fi

  # P4: Dashboard Deployment 
  deploy-dashboard:
    name: P4 - Security Dashboard
    runs-on: ubuntu-latest
    needs: decide
    if: |
      needs.decide.result == 'success' && 
      (github.ref == 'refs/heads/main' || github.event.inputs.force_full_scan == 'true')
    outputs:
      dashboard-url: ${{ steps.url.outputs.url }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download final report
      uses: actions/download-artifact@v4
      with:
        name: securflow-final-report
        path: shared/

    - name: Copy final report into dashboard folder
      run: |
        cp shared/3_final_report.json report.json
        echo "report.json copie à la racine"

    - name: Enforce security gate decision
      run: |
        BLOQUER=$(python3 -c "
        import json
        with open('shared/3_final_report.json') as f:
            d = json.load(f)
        print(d.get('decision_metadata', {}).get('decisions', {}).get('BLOQUER', 0))
        ")
        echo "Failles BLOQUER detectees : $BLOQUER"
        if [ "$BLOQUER" -gt 0 ]; then
          echo ""
          echo "DEPLOIEMENT BLOQUE — $BLOQUER faille(s) critique(s)"
          echo "Consultez le rapport : https://itsnoha0x.github.io/SecurFlow/"
          echo ""
          exit 1
        else
          echo "PIPELINE OK — aucune faille critique"
        fi

    - name: Copy final report to root
      run: |
        cp shared/3_final_report.json ./report.json

    - name: Upload dashboard artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: securflow-dashboard
        path: ./
        retention-days: 30

    - name: Download report
      uses: actions/download-artifact@v4
      with:
        name: securflow-final-report
        path: .

    - name: Link report for Dashboard
      run: cp shared/3_final_report.json ./report.json

    - name: Deploy to GitHub Pages
      id: deploy
      if: always() && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        destination_dir: .

    - name: Deploy preview (autres branches)
      id: deploy-preview
      if: always() && github.ref != 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        destination_dir: security-dashboard-preview

    - name: Get dashboard URL
      id: url
      run: |
        if [ "${{ github.ref }}" == "refs/heads/main" ]; then
          echo "url=https://itsnoha0x.github.io/SecurFlow/" >> $GITHUB_OUTPUT
        else
          echo "url=https://itsnoha0x.github.io/SecurFlow/security-dashboard-preview/" >> $GITHUB_OUTPUT
        fi

# Global failure notification
  notify:
    name: Pipeline Notification
    runs-on: ubuntu-latest
    needs: [scan, enrich, decide]
    if: always()
    
    steps:
    - name: Notify on success
      if: needs.decide.result == 'success'
      run: |
        echo "## ✅ CTI Pipeline Completed Successfully" >> $GITHUB_STEP_SUMMARY
        echo "Security analysis completed with AI-powered decision making." >> $GITHUB_STEP_SUMMARY
        echo "View detailed results in the Actions artifacts." >> $GITHUB_STEP_SUMMARY
        
    - name: Notify on failure
      if: needs.decide.result == 'failure'
      run: |
        echo "## ❌ CTI Pipeline Failed" >> $GITHUB_STEP_SUMMARY
        echo "Security pipeline encountered errors. Please check the logs." >> $GITHUB_STEP_SUMMARY
        
    - name: Critical alert notification
      if: needs.decide.outputs.pipeline-blocked == 'true'
      run: |
        echo "## 🚨 CRITICAL SECURITY ALERT" >> $GITHUB_STEP_SUMMARY
        echo "Critical vulnerabilities detected requiring immediate attention!" >> $GITHUB_STEP_SUMMARY
        echo "Pipeline has been **BLOCKED** for security reasons." >> $GITHUB_STEP_SUMMARY

  commit-report:
    runs-on: ubuntu-latest
    needs: [scan, enrich, decide, deploy-dashboard]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Télécharger l'artéfact du rapport
        uses: actions/download-artifact@v4
        with:
          name: securflow-final-report
          path: ./shared/
      
      - name: Configurer git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commiter et pousser le rapport sur la branche
        run: |
          if [ -f shared/3_final_report.json ] && [ -s shared/3_final_report.json ]; then
            echo "✅ Rapport trouvé, sauvegarde en cours..."
            git add shared/3_final_report.json
            git diff --staged --quiet || git commit -m "🤖 mise à jour automatique du rapport CTI [skip ci]"
            git push
            echo "✅ Rapport poussé avec succès"
          else
            echo "⚠️ Aucun rapport valide à committer"
          fi