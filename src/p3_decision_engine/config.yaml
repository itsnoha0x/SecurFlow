# P3 Decision Engine Configuration

# High-impact components (1.5x SRP modifier)
high_context_components:
  - sqlalchemy
  - psycopg2
  - mongoose
  - sequelize
  - typeorm

# AI Model Configuration
ai_config:
  model_name: "deepseek-ai/DeepSeek-V4-Flash"
  temperature: 0.1
  max_tokens: 4000
  timeout_seconds: 30
  retry_attempts: 3
  base_url: "https://api.featherless.ai/v1"

# Decision Thresholds
decision_thresholds:
  block_threshold: 7.0
  alert_threshold: 4.0
  pass_threshold: 0.0

# Performance Optimization
performance:
  max_workers: 1
  batch_size: 10
  cache_enabled: true
  cache_ttl_hours: 24

# File Paths
paths:
  input_file: "../../shared/2_enriched.json"
  output_file: "../../shared/3_final_report.json"
  log_file: "decision_engine.log"

# Database Configuration (Future Enhancement)
database:
  enabled: false
  connection_string: "${DATABASE_URL}"
  table_name: "vulnerability_decisions"
  backup_enabled: true

# Reporting Settings
reporting:
  include_ai_explanations: true
  include_fix_recommendations: true
  sort_by_srp_desc: true
  generate_summary: true